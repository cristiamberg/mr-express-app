<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MR Express</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2766/2766805.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Configuração para o Dark Mode -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Chart.js para os gráficos -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Importmap -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body>
  
  <div id="root"></div>

  <!-- Registro do Service Worker para PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker registrado com sucesso: ', registration.scope);
          })
          .catch(error => {
            console.log('Falha no registro do ServiceWorker: ', error);
          });
      });
    }
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      CheckCircle, Circle, Plus, Trash2, TrendingUp, Users, Wallet,
      Menu, X, Save, AlertCircle, History, Printer, Filter, ArrowDownUp,
      LogOut, Download, LogIn, Sun, Moon, FileSpreadsheet, PieChart
    } from 'lucide-react';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBNzSXr8gJtL0uTiUzOq37NceSkj5XcfUk",
      authDomain: "mr-express-app.firebaseapp.com",
      databaseURL: "https://mr-express-app-default-rtdb.firebaseio.com",
      projectId: "mr-express-app",
      storageBucket: "mr-express-app.firebasestorage.app",
      messagingSenderId: "734104552198",
      appId: "1:734104552198:web:7fe64ae35d311a96601487"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Habilitar Persistência Offline
    enableIndexedDbPersistence(db).catch((err) => console.warn("Modo offline falhou", err));

    const googleProvider = new GoogleAuthProvider();

    const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
    const formatDate = (isoString) => new Intl.DateTimeFormat('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }).format(new Date(isoString));
    const parseNumber = (value) => {
      if (typeof value === 'number') return value;
      if (!value) return 0;
      const parsed = parseFloat(value.toString().replace(/\./g, '').replace(',', '.'));
      return isNaN(parsed) ? 0 : parsed;
    };

    const defaultDespesas = [
      { id: 1, descricao: 'Aluguel', valor: 0, pago: false },
      { id: 2, descricao: 'Internet', valor: 0, pago: false },
      { id: 3, descricao: 'Energia', valor: 0, pago: false },
    ];
    const defaultEntregadores = [
      { id: 1, nome: 'Carlos', valorPorPacote: 2.20, quantidade: 0, vales: 0, pago: false },
      { id: 2, nome: 'Everton', valorPorPacote: 2.30, quantidade: 0, vales: 0, pago: false },
    ];

    // Componente de Gráfico
    function ResumoChart({ totais, darkMode }) {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (chartInstance.current) chartInstance.current.destroy();
        const ctx = chartRef.current.getContext('2d');
        chartInstance.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Despesas Fixas', 'Custo Entregadores'],
            datasets: [{
              data: [totais.despesas, totais.entregadores],
              backgroundColor: ['#3b82f6', '#f59e0b'],
              borderColor: darkMode ? '#1e293b' : '#ffffff',
              borderWidth: 2
            }]
          },
          options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: {
                legend: { labels: { color: darkMode ? '#cbd5e1' : '#475569' } }
            }
          }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); }
      }, [totais, darkMode]);

      return <div className="h-48 w-full relative"><canvas ref={chartRef}></canvas></div>;
    }

    function App() {
      const [user, setUser] = useState(null);
      const [loadingAuth, setLoadingAuth] = useState(true);
      const [installPrompt, setInstallPrompt] = useState(null);

      const [activeTab, setActiveTab] = useState('resumo');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      const [darkMode, setDarkMode] = useState(true);
      const [toast, setToast] = useState(null);

      const [periodo, setPeriodo] = useState('Semana 1');
      const [dataInicio, setDataInicio] = useState(new Date().toISOString());
      const [despesas, setDespesas] = useState(defaultDespesas);
      const [entregadores, setEntregadores] = useState(defaultEntregadores);
      const [historico, setHistorico] = useState([]);
      
      const [filterEntregadoresPendentes, setFilterEntregadoresPendentes] = useState(false);
      const [sortByQuantidade, setSortByQuantidade] = useState(false);
      const [modalConfig, setModalConfig] = useState({ isOpen: false, title: '', message: '', action: null });

      const showToast = (message) => {
        setToast(message);
        setTimeout(() => setToast(null), 3000);
      };

      useEffect(() => {
        const handler = (e) => { e.preventDefault(); setInstallPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      // Alerta anti-fechamento acidental
      useEffect(() => {
        const handleBeforeUnload = (e) => { e.preventDefault(); e.returnValue = ''; };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, []);

      useEffect(() => {
        const savedTheme = localStorage.getItem('mr_express_theme');
        if (savedTheme === 'light') setDarkMode(false);
      }, []);

      const toggleTheme = () => {
        const newTheme = !darkMode;
        setDarkMode(newTheme);
        localStorage.setItem('mr_express_theme', newTheme ? 'dark' : 'light');
        showToast(`Modo ${newTheme ? 'Escuro' : 'Claro'} ativado!`);
      };

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
            const docRef = doc(db, 'users', currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.periodo) setPeriodo(data.periodo);
              if (data.dataInicio) setDataInicio(data.dataInicio);
              if (data.despesas) setDespesas(data.despesas);
              if (data.entregadores) setEntregadores(data.entregadores);
              if (data.historico) setHistorico(data.historico);
            }
          } else {
            setUser(null);
          }
          setLoadingAuth(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (user && !loadingAuth) {
          setDoc(doc(db, 'users', user.uid), {
            periodo, dataInicio, despesas, entregadores, historico
          }, { merge: true }).catch(err => console.error("Erro ao salvar:", err));
        }
      }, [periodo, dataInicio, despesas, entregadores, historico, user, loadingAuth]);

      const handleLogin = async () => {
        try { 
          const provider = new GoogleAuthProvider();
          await signInWithPopup(auth, provider); 
        } catch (error) { 
          console.error("ERRO DETALHADO DE LOGIN:", error);
          alert(`Erro ao fazer login: ${error.message}`); 
        }
      };

      const handleInstallApp = async () => {
        if (installPrompt) {
          installPrompt.prompt();
          const { outcome } = await installPrompt.userChoice;
          if (outcome === 'accepted') setInstallPrompt(null);
        }
      };

      const exportarCSV = () => {
        let csv = 'Periodo,Data Inicio,Data Fechamento,Total Despesas,Custo Entregadores,Total Pacotes\n';
        historico.forEach(h => {
           csv += `${h.periodo},${formatDate(h.dataInicio)},${formatDate(h.dataFechamento)},${h.totais.despesas},${h.totais.entregadores},${h.totais.pacotes}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `mrexpress_historico_${new Date().getTime()}.csv`;
        link.click();
        showToast("Relatório CSV baixado!");
      };

      const totais = useMemo(() => {
        const totalDespesas = despesas.reduce((acc, curr) => acc + parseNumber(curr.valor), 0);
        const totalDespesasPagas = despesas.filter(d => d.pago).reduce((acc, curr) => acc + parseNumber(curr.valor), 0);
        
        // Custos com entregadores
        const totalEntregadores = entregadores.reduce((acc, curr) => acc + (parseNumber(curr.valorPorPacote) * parseNumber(curr.quantidade)), 0);
        
        // Pagamentos de entregadores (se pago = tudo. se pendente = apenas soma os vales dados)
        const totalEntregadoresPagos = entregadores.reduce((acc, curr) => {
            const custoTotal = parseNumber(curr.valorPorPacote) * parseNumber(curr.quantidade);
            return acc + (curr.pago ? custoTotal : parseNumber(curr.vales || 0));
        }, 0);
        
        const totalPacotes = entregadores.reduce((acc, curr) => acc + parseNumber(curr.quantidade), 0);

        return {
          despesas: totalDespesas, despesasPagas: totalDespesasPagas,
          entregadores: totalEntregadores, entregadoresPagos: totalEntregadoresPagos,
          geral: totalDespesas + totalEntregadores, geralPago: totalDespesasPagas + totalEntregadoresPagos,
          pacotes: totalPacotes
        };
      }, [despesas, entregadores]);

      const updateDespesa = (id, field, value) => setDespesas(despesas.map(d => d.id === id ? { ...d, [field]: value } : d));
      const toggleDespesaPago = (id) => {
          setDespesas(despesas.map(d => d.id === id ? { ...d, pago: !d.pago } : d));
          showToast("Status de pagamento atualizado!");
      };
      const addDespesa = () => { setDespesas([...despesas, { id: Date.now(), descricao: '', valor: 0, pago: false }]); showToast("Nova despesa adicionada."); };
      const removeDespesa = (id) => { setDespesas(despesas.filter(d => d.id !== id)); showToast("Despesa removida."); };

      const updateEntregador = (id, field, value) => setEntregadores(entregadores.map(e => e.id === id ? { ...e, [field]: value } : e));
      const toggleEntregadorPago = (id) => {
          setEntregadores(entregadores.map(e => e.id === id ? { ...e, pago: !e.pago } : e));
          showToast("Status do entregador atualizado!");
      };
      const addEntregador = () => { setEntregadores([...entregadores, { id: Date.now(), nome: '', valorPorPacote: 0, quantidade: 0, vales: 0, pago: false }]); showToast("Entregador adicionado."); };
      const removeEntregador = (id) => { setEntregadores(entregadores.filter(e => e.id !== id)); showToast("Entregador removido."); };

      const requestFecharSemana = () => {
        setModalConfig({
          isOpen: true,
          title: 'Fechar Semana e Salvar?',
          message: `Deseja finalizar "${periodo}" e salvar no Histórico?\n\nIsso zerará as quantidades, vales e status dos entregadores. (Nomes e valores mantidos).`,
          action: executeFecharSemana
        });
      };

      const executeFecharSemana = () => {
        const novoFechamento = {
          id: Date.now().toString(),
          dataInicio: dataInicio,
          dataFechamento: new Date().toISOString(),
          periodo: periodo, totais: { ...totais },
          entregadores: [...entregadores], despesas: [...despesas]
        };
        setHistorico([novoFechamento, ...historico]);
        setDespesas(despesas.map(d => ({ ...d, pago: false })));
        setEntregadores(entregadores.map(e => ({ ...e, quantidade: 0, vales: 0, pago: false })));
        
        setDataInicio(new Date().toISOString());
        const numeroAtual = parseInt(periodo.replace(/\D/g, '')) || 0;
        setPeriodo(numeroAtual > 0 ? `Semana ${numeroAtual + 1}` : 'Novo Período');
        setActiveTab('historico');
        showToast("Semana fechada com sucesso!");
      };

      const requestDeletarHistorico = (id) => {
        setModalConfig({
          isOpen: true, title: 'Apagar Registro',
          message: 'Deseja apagar este histórico permanentemente?',
          action: () => { setHistorico(historico.filter(h => h.id !== id)); showToast("Histórico apagado."); }
        });
      };

      const NavButton = ({ id, icon: Icon, label }) => (
        <button
          onClick={() => { setActiveTab(id); setIsMobileMenuOpen(false); }}
          className={`flex items-center space-x-2 w-full px-4 py-3 rounded-lg transition-colors ${activeTab === id ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-emerald-600 dark:hover:text-emerald-400'}`}
        >
          <Icon size={20} /> <span className="font-medium">{label}</span>
        </button>
      );

      if (loadingAuth) {
        return <div className={`min-h-screen ${darkMode ? 'dark bg-[#0f172a]' : 'bg-slate-50'} flex items-center justify-center text-emerald-500 font-bold text-xl animate-pulse`}>Carregando...</div>;
      }

      if (!user) {
        return (
          <div className={`${darkMode ? 'dark bg-[#0f172a]' : 'bg-slate-50'} min-h-screen flex flex-col items-center justify-center p-4 transition-colors`}>
            <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-2xl max-w-md w-full text-center transition-colors">
              <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-emerald-700 mb-2">MR EXPRESS</h1>
              <p className="text-slate-500 dark:text-slate-400 mb-8">Faça login para acessar o sistema.</p>
              <button onClick={handleLogin} className="w-full flex items-center justify-center space-x-3 bg-slate-100 dark:bg-slate-900 text-slate-800 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 px-4 py-3 rounded-xl font-bold transition-colors">
                <svg className="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                <span>Entrar com o Google</span>
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className={`${darkMode ? 'dark' : ''}`}>
          <div className="min-h-screen bg-slate-50 dark:bg-[#0f172a] text-slate-800 dark:text-slate-200 font-sans selection:bg-emerald-500/30 flex flex-col md:flex-row transition-colors duration-300">
            {isMobileMenuOpen && ( <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm print:hidden" onClick={() => setIsMobileMenuOpen(false)} /> )}

            {/* Sidebar */}
            <aside className={`print:hidden fixed md:static inset-y-0 left-0 z-50 w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transform transition-transform duration-300 ease-in-out flex flex-col justify-between ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
              <div>
                <div className="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                  <div>
                    <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-emerald-700 dark:from-emerald-400 dark:to-emerald-600 tracking-tight">MR EXPRESS</h1>
                    <p className="text-xs text-slate-500 font-medium tracking-widest mt-1">GESTÃO SIMPLIFICADA</p>
                  </div>
                  <button className="md:hidden text-slate-400 hover:text-slate-800 dark:hover:text-white" onClick={() => setIsMobileMenuOpen(false)}><X size={24} /></button>
                </div>
                <div className="p-4 flex-1 space-y-2 overflow-y-auto">
                  <NavButton id="resumo" icon={TrendingUp} label="Resumo Geral" />
                  <NavButton id="despesas" icon={Wallet} label="Despesas Fixas" />
                  <NavButton id="entregadores" icon={Users} label="Entregadores" />
                  <div className="my-4 border-t border-slate-200 dark:border-slate-800 pt-4">
                    <NavButton id="historico" icon={History} label="Histórico" />
                  </div>
                </div>
              </div>
              <div className="p-4 border-t border-slate-200 dark:border-slate-800 space-y-2">
                <button onClick={toggleTheme} className="flex items-center space-x-2 w-full px-4 py-3 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                   {darkMode ? <Sun size={20} /> : <Moon size={20} />} <span>Modo {darkMode ? 'Claro' : 'Escuro'}</span>
                </button>
                {installPrompt && (
                  <button onClick={handleInstallApp} className="flex items-center space-x-2 w-full px-4 py-3 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-bold transition-colors">
                    <Download size={20} /><span>Instalar Aplicativo</span>
                  </button>
                )}
                <div className="flex items-center justify-between px-2 py-2 pt-4">
                  <div className="flex items-center space-x-2 truncate">
                    <img src={user.photoURL} alt="User" className="w-8 h-8 rounded-full border border-slate-300 dark:border-slate-600" />
                    <span className="text-xs font-semibold text-slate-600 dark:text-slate-400 truncate w-24">{user.displayName}</span>
                  </div>
                  <button onClick={() => signOut(auth)} className="text-slate-500 hover:text-rose-500 dark:hover:text-rose-400 p-2 bg-slate-100 dark:bg-slate-800 rounded-full" title="Sair"><LogOut size={16} /></button>
                </div>
              </div>
            </aside>

            {/* Main Content */}
            <main className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden print:h-auto print:overflow-visible">
              <header className="md:hidden bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4 flex items-center justify-between z-30 shadow-sm dark:shadow-md print:hidden transition-colors">
                <div className="flex items-center space-x-3">
                  <button onClick={() => setIsMobileMenuOpen(true)} className="text-slate-600 dark:text-slate-300 p-1"><Menu size={24} /></button>
                  <h1 className="text-lg font-bold text-slate-800 dark:text-white">MR EXPRESS</h1>
                </div>
                <div className="bg-emerald-100 dark:bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-500/30 px-2 py-1 rounded text-xs font-bold truncate max-w-[100px]">
                  {periodo.split(' ')[0] || 'Atual'}
                </div>
              </header>

              <div className="flex-1 overflow-auto p-4 md:p-8 print:bg-white print:p-0">
                <div className="max-w-5xl mx-auto pb-20 md:pb-0">
                  
                  {activeTab === 'resumo' && (
                    <div className="space-y-6 animate-in fade-in zoom-in-95 duration-300">
                      <div className="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 print:hidden transition-colors shadow-sm">
                        <div className="text-sm text-slate-500 dark:text-slate-400 flex items-center">
                          Período: <span className="ml-2 font-bold text-emerald-600 dark:text-emerald-400 text-lg">{periodo}</span>
                        </div>
                        <div className="flex w-full sm:w-auto gap-2">
                          <button onClick={() => window.print()} className="flex-1 sm:flex-none flex items-center justify-center space-x-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors text-sm font-medium">
                            <Printer size={16} /> <span>PDF</span>
                          </button>
                          <button onClick={requestFecharSemana} className="flex-1 sm:flex-none flex items-center justify-center space-x-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors text-sm font-medium">
                            <Save size={16} /> <span>Fechar Semana</span>
                          </button>
                        </div>
                      </div>

                      <div className="bg-white dark:bg-slate-800 rounded-xl p-6 shadow-md dark:shadow-lg border border-slate-200 dark:border-slate-700 print:border-none print:shadow-none print:bg-white transition-colors">
                        <h2 className="text-xl font-bold text-slate-800 dark:text-white print:text-black mb-6 flex items-center">
                          <TrendingUp className="mr-2 text-emerald-500 dark:text-emerald-400 print:text-emerald-600" /> Visão Geral Financeira
                        </h2>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-center">
                          <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div className="bg-slate-50 dark:bg-slate-700/50 print:bg-slate-100 p-5 rounded-xl border border-slate-200 dark:border-slate-600 print:border-slate-300">
                              <p className="text-sm font-medium text-slate-500 dark:text-slate-400 print:text-slate-600 mb-1">Custo Total Projetado</p>
                              <p className="text-4xl font-black text-slate-800 dark:text-white print:text-black">{formatCurrency(totais.geral)}</p>
                            </div>

                        <div className="space-y-4">
                          {historico.map((item) => (
                            <div key={item.id} className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                              <div className="p-5 flex flex-col md:flex-row justify-between md:items-center bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 gap-4">
                                <div>
                                  <h3 className="text-lg font-black text-emerald-600 dark:text-emerald-400">{item.periodo}</h3>
                                  <div className="text-xs font-medium text-slate-500 dark:text-slate-400 flex flex-col mt-1">
                                    <span>Início: {formatDate(item.dataInicio || item.dataFechamento)}</span>
                                    <span>Fechado: {formatDate(item.dataFechamento)}</span>
                                  </div>
                                </div>
                                <div className="flex flex-wrap items-center gap-4 bg-white dark:bg-slate-800 p-3 rounded-lg border border-slate-200 dark:border-slate-700">
                                  <div className="text-right">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Total Despesas</div>
                                    <div className="font-black text-slate-800 dark:text-white">{formatCurrency(item.totais.despesas)}</div>
                                  </div>
                                  <div className="text-right border-l border-slate-200 dark:border-slate-700 pl-4">
                                    <div className="text-[10px] font-bold text-slate-400 uppercase">Entregadores</div>
                                    <div className="font-black text-slate-800 dark:text-white">{formatCurrency(item.totais.entregadores)}</div>
                                  </div>
                                  <button onClick={() => requestDeletarHistorico(item.id)} className="ml-2 p-2 bg-rose-50 dark:bg-rose-900/20 text-rose-500 hover:bg-rose-500 hover:text-white rounded-full transition-colors border border-rose-100 dark:border-rose-800/30 shadow-sm" title="Apagar"><Trash2 size={16} /></button>
                                </div>
                              </div>
                              <div className="p-5 text-sm text-slate-600 dark:text-slate-300">
                                <p className="mb-3 font-medium"><strong>Pacotes Entregues na Semana:</strong> <span className="bg-slate-100 dark:bg-slate-700 px-2 py-1 rounded-md font-black">{item.totais.pacotes}</span></p>
                                <div className="flex flex-wrap gap-2">
                                  {item.entregadores.filter(e => e.quantidade > 0).map((e, idx) => (
                                    <span key={idx} className="bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-1.5 rounded-lg text-xs flex items-center shadow-sm">
                                      {e.nome}: <strong className="text-slate-800 dark:text-white ml-1">{e.quantidade} pct</strong>
                                    </span>
                                  ))}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </main>

            {/* Modal de Confirmação */}
            {modalConfig.isOpen && (
              <div className="fixed inset-0 bg-slate-900/50 dark:bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm print:hidden animate-in fade-in duration-200">
                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 max-w-md w-full shadow-2xl animate-in zoom-in-95 duration-200">
                  <h3 className="text-xl font-black text-slate-800 dark:text-white mb-3 flex items-center">
                    <AlertCircle className="mr-2 text-amber-500" size={28} /> {modalConfig.title}
                  </h3>
                  <p className="text-slate-600 dark:text-slate-300 mb-8 whitespace-pre-wrap font-medium leading-relaxed">{modalConfig.message}</p>
                  <div className="flex flex-col-reverse sm:flex-row justify-end sm:space-x-3 gap-3 sm:gap-0">
                    <button onClick={() => setModalConfig({ isOpen: false })} className="w-full sm:w-auto px-5 py-3 rounded-xl text-sm font-bold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">Cancelar</button>
                    <button onClick={() => { if (modalConfig.action) modalConfig.action(); setModalConfig({ isOpen: false }); }} className="w-full sm:w-auto px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-bold transition-colors shadow-md">Confirmar</button>
                  </div>
                </div>
              </div>
            )}

            {/* Toast Notification Flutuante */}
            {toast && (
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] animate-in slide-in-from-bottom-5 fade-in duration-300">
                <div className="bg-emerald-600 text-white px-6 py-3 rounded-full shadow-xl font-bold flex items-center gap-2 border border-emerald-500">
                  <CheckCircle size={18} />
                  <span>{toast}</span>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
